groups:
  - id: span.thousandeyes.page_load
    type: span
    span_kind: client
    stability: development
    brief: Span emitted for ThousandEyes page load test traces.
    note: >
      This span models the trace layer emitted by ThousandEyes page load tests.
    extends: span_attributes.thousandeyes.traces.common
    entity_associations:
      - thousandeyes.trace.signal
      - thousandeyes.trace.service
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent

  - id: span.thousandeyes.transaction
