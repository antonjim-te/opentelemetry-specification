groups:
  - id: registry.thousandeyes.attributes
    type: attribute_group
    brief: Common ThousandEyes attributes shared across sections.
    attributes:
      - id: thousandeyes.stream.id
        type: string
        stability: development
        brief: UUID of the integration used to route the datapoint.
        examples: ["123e4567-e89b-12d3-a456-426614174000"]
      - id: thousandeyes.account.id
        type: string
        stability: development
        brief: ThousandEyes account identifier.
        examples: ["987654"]
      - id: thousandeyes.test.domain
        type: string
        stability: development
        brief: Domain origin of the test data.
        examples: ["cea", "endpoint"]
      - id: thousandeyes.test.id
        type: string
        stability: development
        brief: ThousandEyes test identifier.
        examples: ["246810"]
      - id: thousandeyes.test.name
        type: string
        stability: development
        brief: Human-readable ThousandEyes test name.
        examples: ["Login page check"]
      - id: thousandeyes.test.type
        type: string
        stability: development
        brief: ThousandEyes test type.
        examples: ["http-server"]
      - id: thousandeyes.source.agent.id
        type: string
        stability: development
        brief: Identifier of the source agent that ran the test.
        examples: ["12345"]
      - id: thousandeyes.source.agent.name
        type: string
        stability: development
        brief: Source agent name.
        examples: ["us-west-1a"]
      - id: thousandeyes.source.agent.location
        type: string
        stability: development
        brief: Source agent location.
        examples: ["San Jose, CA, US"]
      - id: thousandeyes.source.agent.geoname.id
        type: string
        stability: development
        brief: GeoNames identifier for the source agent location.
        examples: ["5392171"]
      - id: thousandeyes.source.agent.geo.region.iso_code
        type: string
        stability: development
        brief: ISO region code for the source agent.
        examples: ["US-CA"]
      - id: thousandeyes.source.agent.geo.country.iso_code
        type: string
        stability: development
        brief: ISO country code for the source agent.
        examples: ["US"]
      - id: thousandeyes.data.version
        type: string
        stability: development
        brief: ThousandEyes data model version.
        examples: ["v2"]
      - id: thousandeyes.permalink
        type: string
        stability: development
        brief: URL to the ThousandEyes test instance.
        examples: ["https://app.thousandeyes.com/tests/12345"]

  - id: registry.thousandeyes.attributes.section_specific
    type: attribute_group
    brief: Section-specific attributes used by Endpoint Experience tests.
    attributes:
      - id: server.address
        type: string
        stability: development
        brief: Server domain name or address.
        examples: ["example.com"]
      - id: server.port
        type: int
        stability: development
        brief: Server port number.
      - id: url.scheme
        type: string
        stability: development
        brief: URL scheme.
        examples: ["https"]
      - id: http.request.method
        type: string
        stability: development
        brief: HTTP request method.
        examples: ["GET"]
      - id: network.transport
        type: string
        stability: development
        brief: Network transport protocol.
        examples: ["tcp"]
      - id: error.type
        type: string
        stability: development
        brief: Error class of the operation.
        examples: ["timeout"]
      - id: http.response.status_code
        type: int
        stability: development
        brief: HTTP response status code.

  - id: entity.thousandeyes.stream
    type: entity
    name: thousandeyes.stream
    brief: ThousandEyes integration stream carrying telemetry.
    stability: development
    attributes:
      - ref: thousandeyes.stream.id
        requirement_level: required
        role: identifying

  - id: entity.thousandeyes.account
    type: entity
    name: thousandeyes.account
    brief: ThousandEyes account producing the telemetry.
    stability: development
    attributes:
      - ref: thousandeyes.account.id
        requirement_level: required
        role: identifying

  - id: entity.thousandeyes.test
    type: entity
    name: thousandeyes.test
    brief: ThousandEyes test definition context.
    stability: development
    attributes:
      - ref: thousandeyes.test.id
        requirement_level: required
        role: identifying
      - ref: thousandeyes.test.name
        role: descriptive
      - ref: thousandeyes.test.type
        role: descriptive
      - ref: thousandeyes.test.domain
        role: descriptive
      - ref: thousandeyes.data.version
        role: descriptive
      - ref: thousandeyes.permalink
        role: descriptive

  - id: entity.thousandeyes.source.agent
    type: entity
    name: thousandeyes.source.agent
    brief: Source agent that executed the ThousandEyes test.
    stability: development
    attributes:
      - ref: thousandeyes.source.agent.id
        requirement_level: required
        role: identifying
      - ref: thousandeyes.source.agent.name
        role: descriptive
      - ref: thousandeyes.source.agent.location
        role: descriptive
      - ref: thousandeyes.source.agent.geoname.id
        role: descriptive
      - ref: thousandeyes.source.agent.geo.region.iso_code
        role: descriptive
      - ref: thousandeyes.source.agent.geo.country.iso_code
        role: descriptive

  - id: entity.thousandeyes.endpoint.tests.http_target
    type: entity
    name: thousandeyes.endpoint.tests.http_target
    brief: HTTP target context for Endpoint Experience tests.
    stability: development
    attributes:
      - ref: server.address
        requirement_level: required
        role: identifying
      - ref: server.port
        requirement_level: opt_in
        role: descriptive
      - ref: url.scheme
        requirement_level: opt_in
        role: descriptive
      - ref: http.request.method
        requirement_level: opt_in
        role: descriptive

  - id: entity.thousandeyes.endpoint.tests.network_target
    type: entity
    name: thousandeyes.endpoint.tests.network_target
    brief: Agent-to-server network target context for Endpoint Experience tests.
    stability: development
    attributes:
      - ref: server.address
        requirement_level: required
        role: identifying
      - ref: server.port
        requirement_level: opt_in
        role: descriptive
      - ref: network.transport
        requirement_level: opt_in
        role: descriptive

  - id: metric_attributes.thousandeyes.endpoint.tests.http_server
    type: attribute_group
    brief: Datapoint attributes for Endpoint Experience HTTP server tests.
    attributes:
      - ref: error.type
      - ref: http.response.status_code

  - id: metric_attributes.thousandeyes.endpoint.tests.agent_to_server
    type: attribute_group
    brief: Datapoint attributes for Endpoint Experience agent-to-server tests.
    attributes:
      - ref: error.type
