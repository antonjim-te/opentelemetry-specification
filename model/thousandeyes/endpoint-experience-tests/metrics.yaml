groups:
  # Shared metric definitions used by Endpoint Experience - Tests.
  # These metric names are also used by Network & App Synthetics tests.
  - id: metric.http.server.request.availability
    type: metric
    metric_name: http.server.request.availability
    brief: Calculated based on the errors reported during the test. If any errors occur, the availability is 0%; otherwise, it is 100%.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.tests.http_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.endpoint.tests.http_target

  - id: metric.http.server.throughput
    type: metric
    metric_name: http.server.throughput
    brief: Throughput of test in bytes per second.
    instrument: gauge
    unit: "B/s"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.tests.http_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.endpoint.tests.http_target

  - id: metric.http.client.request.duration
    type: metric
    metric_name: http.client.request.duration
    brief: Time to first byte (TTFB) as measured on the client.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.tests.http_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.endpoint.tests.http_target

  - id: metric.network.latency
    type: metric
    metric_name: network.latency
    brief: The maximum round-trip time for packets sent to the target.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.tests.agent_to_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.endpoint.tests.network_target

  - id: metric.network.loss
    type: metric
    metric_name: network.loss
    brief: Packet loss.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.tests.agent_to_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.endpoint.tests.network_target

  - id: metric.network.jitter
    type: metric
    metric_name: network.jitter
    brief: Standard deviation of the round-trip times.
    instrument: gauge
    unit: "ms"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.tests.agent_to_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.endpoint.tests.network_target
