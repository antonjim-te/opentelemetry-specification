groups:
  - id: metric.network.latency
    type: metric
    metric_name: network.latency
    brief: The maximum round-trip time for packets sent to the target.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.local.network
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.source.agent
      - thousandeyes.endpoint.local.target

  - id: metric.network.loss
    type: metric
    metric_name: network.loss
    brief: Packet loss.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.local.network
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.source.agent
      - thousandeyes.endpoint.local.target

  - id: metric.dns.lookup.duration
    type: metric
    metric_name: dns.lookup.duration
    brief: DNS resolve time.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.local.dns
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.source.agent
      - thousandeyes.endpoint.local.dns_target

  - id: metric.network.score
    type: metric
    metric_name: network.score
    brief: Score aggregated from latency, jitter, and loss scores.
    instrument: gauge
    unit: "1{score}"
    stability: development
    extends: metric_attributes.thousandeyes.endpoint.local.network
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.source.agent
      - thousandeyes.endpoint.local.target

  - id: metric.system.cpu.utilization
    type: metric
    metric_name: system.cpu.utilization
    brief: Percentage of CPU utilization.
    instrument: gauge
    unit: "%"
    stability: development
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.source.agent

  - id: metric.system.memory.utilization
    type: metric
    metric_name: system.memory.utilization
    brief: Percentage of memory utilization.
    instrument: gauge
    unit: "%"
    stability: development
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.source.agent

  - id: metric.thousandeyes.endpoint.agent.score
    type: metric
    metric_name: thousandeyes.endpoint.agent.score
    brief: Score aggregated from CPU and memory scores.
    instrument: gauge
    unit: "1{score}"
    stability: development
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.source.agent
