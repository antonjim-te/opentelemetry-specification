      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.ftp_target

  - id: metric.ftp.server.throughput
    type: metric
    metric_name: ftp.server.throughput
    brief: Throughput of test in bytes per second.
    instrument: gauge
    unit: "B/s"
    stability: development
    extends: metric_attributes.thousandeyes.ftp_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.ftp_target

  - id: metric.sip.server.request.availability
    type: metric
    metric_name: sip.server.request.availability
    brief: Calculated depending on the errors reported during the test. If any error occurs, the availability is 0%; otherwise, it is 100%.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.sip_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.sip_target

  - id: metric.sip.client.request.duration
    type: metric
    metric_name: sip.client.request.duration
    brief: Total time it took to receive the first byte while executing the request.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.sip_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.sip_target

  - id: metric.sip.client.request.total_time
    type: metric
    metric_name: sip.client.request.total_time
    brief: Total time it took until the last response was received.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.sip_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.sip_target

  - id: metric.rtp.client.request.mos
    type: metric
    metric_name: rtp.client.request.mos
    brief: Mean opinion score (MOS) for perceived voice quality.
    instrument: gauge
    unit: "1{score}"
    stability: development
    extends: metric_attributes.thousandeyes.rtp_stream
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.rtp_target_agent

  - id: metric.rtp.client.request.loss
    type: metric
    metric_name: rtp.client.request.loss
    brief: Percentage of frames lost, calculated from the number of lost frames and the total number of frames.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.rtp_stream
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.rtp_target_agent

  - id: metric.rtp.client.request.discards
    type: metric
    metric_name: rtp.client.request.discards
    brief: Percentage of frames discarded, calculated from the number of discarded frames and the total number of frames.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.rtp_stream
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.rtp_target_agent

  - id: metric.rtp.client.request.duration
    type: metric
    metric_name: rtp.client.request.duration
    brief: Total time for the test round execution.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.rtp_stream
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.rtp_target_agent

  - id: metric.rtp.client.request.pdv
    type: metric
    metric_name: rtp.client.request.pdv
    brief: Packet delay variation.
    instrument: gauge
    unit: "ms"
    stability: development
    extends: metric_attributes.thousandeyes.rtp_stream
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.rtp_target_agent

  - id: metric.api.duration
    type: metric
    metric_name: api.duration
    brief: The total time the API test took to run, including all steps.
    instrument: gauge
    unit: "s"
    stability: development
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent

  - id: metric.api.completion
    type: metric
    metric_name: api.completion
    brief: Percentage of completion of all the steps of the API test.
    instrument: gauge
    unit: "%"
    stability: development
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent

  - id: metric.api.step.duration
    type: metric
    metric_name: api.step.duration
    brief: Time to complete the API test step.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.api_step
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.api_step_target

  - id: metric.api.step.completion
    type: metric
    metric_name: api.step.completion
    brief: Percentage of API test step completion. It is 100% if the step completes successfully and 0% if there are errors.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.api_step
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.api_step_target
