  - id: metric.ftp.client.request.duration
    type: metric
    metric_name: ftp.client.request.duration
    brief: Total time it took to receive the first byte while executing the request.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.ftp_server
    entity_associations:
