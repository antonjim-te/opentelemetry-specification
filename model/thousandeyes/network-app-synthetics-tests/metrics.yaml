groups:
  - id: metric.http.server.request.availability
    type: metric
    metric_name: http.server.request.availability
    brief: Calculated based on the errors reported during the test. If any errors occur, the availability is 0%; otherwise, it is 100%.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.http_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.http_target

  - id: metric.http.server.throughput
    type: metric
    metric_name: http.server.throughput
    brief: Throughput of test in bytes per second.
    instrument: gauge
    unit: "B/s"
    stability: development
    extends: metric_attributes.thousandeyes.http_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.http_target

  - id: metric.http.client.request.duration
    type: metric
    metric_name: http.client.request.duration
    brief: Time to first byte (TTFB) as measured on the client.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.http_server
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.http_target

  - id: metric.network.latency
    type: metric
    metric_name: network.latency
    brief: The maximum round-trip time for packets sent to the target.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.network_shared
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.network_context

  - id: metric.network.loss
    type: metric
    metric_name: network.loss
    brief: Packet loss.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.network_shared
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.network_context

  - id: metric.network.jitter
    type: metric
    metric_name: network.jitter
    brief: Standard deviation of the round-trip times.
    instrument: gauge
    unit: "ms"
    stability: development
    extends: metric_attributes.thousandeyes.network_shared
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.network_context

  - id: metric.bgp.path_changes.count
    type: metric
    metric_name: bgp.path_changes.count
    brief: Number of BGP route changes.
    instrument: gauge
    unit: "1{PC}"
    stability: development
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.network_app.bgp.route
      - thousandeyes.network_app.bgp.monitor

  - id: metric.bgp.reachability
    type: metric
    metric_name: bgp.reachability
    brief: Indicates if BGP route target is reachable.
    instrument: gauge
    unit: "%"
    stability: development
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.network_app.bgp.route
      - thousandeyes.network_app.bgp.monitor

  - id: metric.bgp.updates.count
    type: metric
    metric_name: bgp.updates.count
    brief: Number of BGP updates.
    instrument: gauge
    unit: "1{update}"
    stability: development
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.network_app.bgp.route
      - thousandeyes.network_app.bgp.monitor

  - id: metric.web.transaction.duration
    type: metric
    metric_name: web.transaction.duration
    brief: The time it took the transaction to complete successfully. This metric is not reported if there are errors.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.transaction
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent

  - id: metric.web.transaction.errors.count
    type: metric
    metric_name: web.transaction.errors.count
    brief: Indicates whether an error occurred during the transaction. Returns 1 if an error occurs, and 0 if not.
    instrument: gauge
    unit: "1{error}"
    stability: development
    extends: metric_attributes.thousandeyes.transaction
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent

  - id: metric.web.transaction.completion
    type: metric
    metric_name: web.transaction.completion
    brief: Percentage of transaction completion. It is 100% if the transaction completes successfully and 0% if there are errors.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.transaction
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent

  - id: metric.dns.lookup.availability
    type: metric
    metric_name: dns.lookup.availability
    brief: Calculated depending on the errors reported during the test. If any error occurs, the availability is 0%; otherwise, it is 100%.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.dns
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.dns_query

  - id: metric.dns.lookup.duration
    type: metric
    metric_name: dns.lookup.duration
    brief: DNS resolve time.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.dns
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.dns_query

  - id: metric.dns.lookup.validity
    type: metric
    metric_name: dns.lookup.validity
    brief: Calculated depending on the errors reported during the test. If any error occurs, the validity is 0%; otherwise, it is 100%.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.dns
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.dns_query

  - id: metric.web.page_load.duration
    type: metric
    metric_name: web.page_load.duration
    brief: Time to fully load the page.
    instrument: gauge
    unit: "s"
    stability: development
    extends: metric_attributes.thousandeyes.page_load
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.server_target

  - id: metric.web.page_load.completion
    type: metric
    metric_name: web.page_load.completion
    brief: Calculated depending on the errors reported during the test. If any error occurs, the completion is 0%; otherwise, it is 100%.
    instrument: gauge
    unit: "%"
    stability: development
    extends: metric_attributes.thousandeyes.page_load
    entity_associations:
      - thousandeyes.stream
      - thousandeyes.account
      - thousandeyes.test
      - thousandeyes.source.agent
      - thousandeyes.network_app.server_target

  - id: metric.ftp.server.request.availability
    type: metric
    metric_name: ftp.server.request.availability
    brief: Calculated depending on the errors reported during the test. If any error occurs, the availability is 0%; otherwise, it is 100%.
    instrument: gauge
